# Integration quality scale status for Smappee EV.
# Values: done | in_progress | todo | exempt.
# This file is advisory for moving toward higher quality levels.

rules:
  # Bronze.
  action-setup: done
  appropriate-polling:
    status: done
    comment: Live charger data is primarily event-driven via MQTT. The REST/API coordinator uses an explicit 30-second update interval for availability and fallback state, while slower Dashboard configuration data is throttled to at most every 30 minutes and refreshed shortly after supported writes.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-triggers:
    status: done
    comment: The integration does not provide custom integration-specific triggers. Users can use the standard Home Assistant state, numeric-state, event, and device/entity triggers.
  docs-conditions:
    status: done
    comment: The integration does not provide custom integration-specific conditions. Users can use the standard Home Assistant state, numeric-state, template, device, and entity conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: done
    comment: MQTT subscriptions, coordinator timers, and background refresh tasks are tied to config entry setup and are cleaned up during unload/reload, with lifecycle tests covering shutdown behavior.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver.
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: REST/API availability and MQTT availability both log once on unavailable transitions and once on recovery, without repeated logs for unchanged failure or heartbeat/no-op states.
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: done
    comment: CI measures coverage for the complete integration and fails below 95%. The current test suite passes this enforced threshold.

  # Gold.
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Smappee EV devices are not locally discoverable by Home Assistant. Setup requires Smappee Dashboard credentials and uses the cloud Dashboard API plus Smappee MQTT, not mDNS, DHCP, SSDP, Bluetooth, USB or local broadcast discovery.
  discovery-update-info:
    status: exempt
    comment: Smappee EV devices are not discovered through local network discovery, so there is no discovered host/IP information to update. Device topology is obtained from the authenticated Smappee Dashboard API.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: todo
    comment: Newly added sites, charging stations, connectors, or LED modules are only discovered after reloading the config entry. Runtime topology rediscovery and dynamic entity creation are not implemented yet.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: done
    comment: Authentication failures use the reauthentication flow and editable credentials use the reconfiguration flow. No other detected condition currently requires separate user intervention through a repair issue or repair flow.
  stale-devices: done

  # Platinum.
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: in_progress
    comment: Mypy passes and the typed SmappeeEvConfigEntry alias is used for runtime data. Remaining work includes replacing broad DashboardObject/dict shapes with narrower TypedDicts or dataclasses and enabling a strict mypy configuration comparable to Home Assistant's .strict-typing checks.
