set_current:
  description: "Set charging current in Ampere (1 decimal precision). The value is translated to the nearest integer percentage and sent via setPercentageLimit. The slider and number entities update immediately."
  fields:
    config_entry_id:
      description: "Optional: Specific config entry id to target (when multiple entries)."
      required: false
      example: "a1b2c3d4e5f6"
    service_location_id:
      description: "Optional: Service Location ID."
      required: false
      example: 173311
      selector:
        number:
          min: 1
    connector_id:
      description: "Optional: Connector number."
      required: false
      example: 1
      selector:
        number:
          min: 1
    current:
      description: "Charging current in Ampere (1 decimal place, e.g. 11.4). Clamped to the connector's configured min–max range."
      required: true
      example: 11.4
      selector:
        number:
          min: 6.0
          max: 32.0
          step: 0.1
          unit_of_measurement: "A"

set_charging_mode:
  description: "Set the charging mode (STANDARD, SMART, SOLAR) via the smartdevices endpoint."
  fields:
    config_entry_id:
      description: "Optional: Specific config entry id to target (when multiple entries)."
      required: false
      example: "a1b2c3d4e5f6"
    service_location_id:
      description: "Optional: Service Location ID."
      required: false
      example: 173311
      selector:
        number:
          min: 1
    connector_id:
      description: "Optional: Connector number."
      required: false
      example: 1
      selector:
        number:
          min: 1
    mode:
      description: "Charging mode to apply."
      required: true
      selector:
        select:
          options:
            - STANDARD
            - SMART
            - SOLAR

set_charging_mode_chargingstations:
  description: "Set the charging mode using the chargingstations endpoint (NORMAL, SMART, PAUSED)."
  fields:
    config_entry_id:
      description: "Optional: Specific config entry id to target (when multiple entries)."
      required: false
      example: "a1b2c3d4e5f6"
    charging_station_serial:
      description: "Optional: Charging station serial number. Use this when multiple stations share the same connector number."
      required: false
      example: "1234567890"
      selector:
        text:
    connector_id:
      description: "Connector number (position in the chargingstations endpoint)."
      required: true
      example: 1
      selector:
        number:
          min: 1
    mode:
      description: "Charging mode to apply (chargingstations endpoint)."
      required: true
      selector:
        select:
          options:
            - NORMAL
            - SMART
            - PAUSED
    limit:
      description: "Optional: Limit value (only used when mode=NORMAL)."
      required: false
      example: 16
      selector:
        number:
          min: 0
    limit_unit:
      description: "Optional: Unit for limit when mode=NORMAL."
      required: false
      example: "AMPERE"
      selector:
        select:
          options:
            - AMPERE
            - PERCENTAGE

pause_charging:
  description: "Pause charging on a connector (via smartdevices endpoint — recommended, matches Smappee app behaviour)."
  fields:
    config_entry_id:
      description: "Optional: Specific config entry id to target (when multiple entries)."
      required: false
      example: "a1b2c3d4e5f6"
    service_location_id:
