set_current:
  description: "Set charging current in Ampere (1 decimal precision). The value is translated to the nearest integer percentage and sent via setPercentageLimit. The slider and number entities update immediately."
  fields:
    config_entry_id:
      description: "Optional: Specific config entry id to target (when multiple entries)."
      required: false
      example: "a1b2c3d4e5f6"
    service_location_id:
      description: "Optional: Service Location ID."
      required: false
      example: 173311
      selector:
        number:
          min: 1
    connector_id:
      description: "Optional: Connector number."
      required: false
      example: 1
      selector:
        number:
          min: 1
    current:
      description: "Charging current in Ampere (1 decimal place, e.g. 11.4). Clamped to the connector's configured min–max range."
      required: true
      example: 11.4
      selector:
        number:
          min: 6.0
          max: 32.0
          step: 0.1
          unit_of_measurement: "A"

set_charging_mode:
  description: "Set the charging mode (STANDARD, SMART, SOLAR) via the Dashboard v10 device action when available."
  fields:
    config_entry_id:
      description: "Optional: Specific config entry id to target (when multiple entries)."
      required: false
      example: "a1b2c3d4e5f6"
    service_location_id:
      description: "Optional: Service Location ID."
      required: false
      example: 173311
      selector:
        number:
          min: 1
    connector_id:
      description: "Optional: Connector number."
      required: false
      example: 1
      selector:
        number:
          min: 1
    mode:
      description: "Charging mode to apply."
      required: true
      selector:
        select:
          options:
            - STANDARD
            - SMART
            - SOLAR

