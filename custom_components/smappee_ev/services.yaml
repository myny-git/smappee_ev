        number:
          min: 1

pause_charging_chargingstations:
  description: "Pause charging via the chargingstations endpoint (legacy fallback — use pause_charging for normal operation)."
  fields:
    config_entry_id:
      description: "Optional: Specific config entry id to target (when multiple entries)."
