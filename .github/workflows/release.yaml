name: Zip Release

on:
  release:
    types:
      - published

jobs:
  release:
    name: Release Smappee EV
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: ⤵️ Check out main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: 🔢 Update version in manifest.json
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version,,}"
          version="${version#v}"

          python - <<EOF
          import json
          from pathlib import Path

          path = Path("custom_components/smappee_ev/manifest.json")
          data = json.loads(path.read_text())
          data["version"] = "${version}"
          path.write_text(json.dumps(data, indent=2) + "\n")
          EOF

      - name: 💾 Commit manifest.json version bump
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version,,}"
          version="${version#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add custom_components/smappee_ev/manifest.json

          if git diff --cached --quiet; then
            echo "No version change to commit."
          else
            git commit -m "Bump manifest version to ${version}"
            git push origin main
          fi

      - name: 📦 Create zipped release package
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/smappee_ev"
          zip smappee_ev.zip -r ./ -x "smappee_ev.zip"

      - name: ⬆️ Upload zip to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/custom_components/smappee_ev/smappee_ev.zip